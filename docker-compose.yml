services:
  preprocess:
    build: .
    volumes:
      - ./output:/work/output
      - ./scripts:/work/scripts
      - hf-cache:/root/.cache/huggingface
    entrypoint: ["python3"]

  train:
    build:
      context: .
      dockerfile: Dockerfile.train
    runtime: nvidia
    gpus: all
    volumes:
      - ./output:/work/output
      - ./scripts:/work/scripts
      - ./checkpoints:/work/checkpoints
    entrypoint: ["python3"]

volumes:
  hf-cache:
